<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기</title>
  <style>
    :root {
      --bg: #f2f5f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0ea5e9;
      --accent-2: #0284c7;
      --key: #e5e7eb;
      --key-op: #dbeafe;
      --danger: #fecaca;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #e0f2fe, var(--bg));
      color: var(--text);
      padding: 20px;
    }

    .calculator {
      width: min(360px, 100%);
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .display-wrap {
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #e2e8f0;
    }

    .expression {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
      text-align: right;
      word-break: break-all;
    }

    .display {
      margin-top: 6px;
      min-height: 34px;
      font-size: 30px;
      font-weight: 700;
      text-align: right;
      word-break: break-all;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 0;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      background: var(--key);
      transition: transform 0.08s ease, filter 0.15s ease;
    }

    button:hover {
      filter: brightness(0.96);
    }

    button:active {
      transform: translateY(1px);
    }

    .op {
      background: var(--key-op);
      color: #1e3a8a;
    }

    .danger {
      background: var(--danger);
      color: #991b1b;
    }

    .equal {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="계산기">
    <h1 class="title">계산기</h1>
    <section class="display-wrap">
      <div class="expression" id="expression"></div>
      <div class="display" id="display">0</div>
    </section>
    <section class="keys">
      <button class="danger" data-action="clear">C</button>
      <button class="danger" data-action="delete">DEL</button>
      <button class="op" data-value="(">(</button>
      <button class="op" data-value=")">)</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="op" data-value="/">÷</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="op" data-value="*">×</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="op" data-value="-">−</button>

      <button data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="equal" data-action="equal">=</button>
      <button class="op" data-value="+">+</button>
    </section>
  </main>

  <script>
    const display = document.getElementById("display");
    const expression = document.getElementById("expression");
    const keys = document.querySelector(".keys");

    let input = "";

    const setDisplay = (value) => {
      display.textContent = value || "0";
    };

    const isSafeExpression = (value) => /^[0-9+\-*/().\s]+$/.test(value);

    const calculate = () => {
      if (!input.trim()) {
        return;
      }
      if (!isSafeExpression(input)) {
        setDisplay("오류");
        return;
      }
      try {
        const result = Function(`"use strict"; return (${input})`)();
        if (!Number.isFinite(result)) {
          setDisplay("오류");
          return;
        }
        expression.textContent = input + " =";
        input = String(Number(result.toFixed(10)));
        setDisplay(input);
      } catch {
        setDisplay("오류");
      }
    };

    keys.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;

      const action = btn.dataset.action;
      const value = btn.dataset.value;

      if (action === "clear") {
        input = "";
        expression.textContent = "";
        setDisplay("0");
        return;
      }

      if (action === "delete") {
        input = input.slice(0, -1);
        setDisplay(input);
        return;
      }

      if (action === "equal") {
        calculate();
        return;
      }

      if (value) {
        input += value;
        setDisplay(input);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (/^[0-9+\-*/().]$/.test(event.key)) {
        input += event.key;
        setDisplay(input);
        return;
      }
      if (event.key === "Backspace") {
        input = input.slice(0, -1);
        setDisplay(input);
        return;
      }
      if (event.key === "Escape") {
        input = "";
        expression.textContent = "";
        setDisplay("0");
        return;
      }
      if (event.key === "Enter") {
        calculate();
      }
    });
  </script>
</body>
</html>
